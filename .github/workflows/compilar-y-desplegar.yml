name: Compilar y Desplegar

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/compilar-y-desplegar.yml'
      - 'GithubActionsDemoApp/**'
      - 'Pruebas/**'
    branches: 
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      # Instalamos .NET
      - name: Instalar .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Obteniendo las dependencias
        run: dotnet restore

      - name: Compilar
        run: dotnet build --no-restore # Para no restuarar porque ya lo hicimos en el anterior paso
        
      - name: Realizar Pruebas
        run: dotnet test --no-build
        
